<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="240" cy="315" r="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A5C45" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#2A5C45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1020" cy="126" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.08"/>
      <stop offset="55%" stop-color="#6EE7B7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="1080" cy="504" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1C3D2E" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#1C3D2E" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1" fill="#6EE7B7" opacity="0.12"/>
    </pattern>
    <mask id="dotfade">
      <ellipse cx="900" cy="315" rx="480" ry="252" fill="white" opacity="0.7"/>
    </mask>

    <linearGradient id="notifgr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A5C45" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1C3D2E" stop-opacity="0.5"/>
    </linearGradient>

    <linearGradient id="linegr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6EE7B7" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#6EE7B7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="linegr2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0"/>
      <stop offset="40%" stop-color="#6EE7B7" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="logobg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243D30"/>
      <stop offset="100%" stop-color="#0F2018"/>
    </linearGradient>
    <radialGradient id="logoshield" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#2A5C45"/>
    </radialGradient>
    <linearGradient id="logos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <radialGradient id="logostar" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </radialGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,700&amp;family=DM+Sans:wght@300;400;500;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Clip to rounded rect -->
  <clipPath id="roundclip"><rect width="1200" height="630" rx="20"/></clipPath>
  <g clip-path="url(#roundclip)">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0F2018"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#dotfade)"/>

  <!-- Diagonal accent lines -->
  <line x1="895" y1="-100" x2="825" y2="730" stroke="url(#linegr)" stroke-width="1"/>
  <line x1="755" y1="-100" x2="685" y2="730" stroke="url(#linegr2)" stroke-width="1"/>

  <!-- ═══ LEFT CONTENT ═══ -->

  <!-- Eyebrow pill -->
  <rect x="88" y="140" width="264" height="32" rx="16" fill="#6EE7B7" fill-opacity="0.1" stroke="#6EE7B7" stroke-opacity="0.2" stroke-width="1"/>
  <text x="104" y="161" font-family="sans-serif" font-size="13" fill="#6EE7B7">✦</text>
  <text x="122" y="160" font-family="'DM Sans', sans-serif" font-size="11" font-weight="600" letter-spacing="1.8" fill="#6EE7B7">AI-POWERED WATCH ASSISTANT</text>

  <!-- Title -->
  <text x="88" y="232" font-family="'Lora', serif" font-size="64" font-weight="700" fill="#F7F6F3" letter-spacing="-2">Never miss a</text>
  <text x="88" y="301" font-family="'Lora', serif" font-size="64" font-weight="700" letter-spacing="-2">
    <tspan fill="#6EE7B7" font-style="italic">deal,</tspan><tspan fill="#F7F6F3"> drop,</tspan>
  </text>
  <text x="88" y="370" font-family="'Lora', serif" font-size="64" font-weight="700" fill="#F7F6F3" letter-spacing="-2">or table again</text>

  <!-- Body text -->
  <text font-family="'DM Sans', sans-serif" font-size="17" font-weight="300" fill="#F7F6F3" fill-opacity="0.62">
    <tspan x="88" y="412">Steward watches prices, restocks, reservations,</tspan>
    <tspan x="88" y="440">and tickets — then taps your shoulder the</tspan>
    <tspan x="88" y="468">moment something opens up.</tspan>
  </text>



  <!-- ═══ STATS ROW ═══ -->

  <!-- Stat 1 -->
  <text x="88" y="577" font-family="'Lora', serif" font-size="26" font-weight="700">
    <tspan fill="#6EE7B7">All</tspan><tspan fill="#F7F6F3"> in one</tspan>
  </text>
  <text x="88" y="596" font-family="'DM Sans', sans-serif" font-size="11" fill="#F7F6F3" fill-opacity="0.4" letter-spacing="0.7">WATCH MOST THINGS ONLINE</text>

  <line x1="295" y1="558" x2="295" y2="602" stroke="white" stroke-opacity="0.08"/>

  <!-- Stat 2 -->
  <text x="325" y="577" font-family="'Lora', serif" font-size="26" font-weight="700">
    <tspan fill="#F7F6F3">Daily</tspan><tspan fill="#6EE7B7">+</tspan>
  </text>
  <text x="325" y="596" font-family="'DM Sans', sans-serif" font-size="11" fill="#F7F6F3" fill-opacity="0.4" letter-spacing="0.7">CHECK FREQUENCY</text>

  <line x1="485" y1="558" x2="485" y2="602" stroke="white" stroke-opacity="0.08"/>

  <!-- Stat 3 -->
  <text x="515" y="577" font-family="'Lora', serif" font-size="26" font-weight="700">
    <tspan fill="#F7F6F3">Free</tspan><tspan fill="#6EE7B7">+</tspan>
  </text>
  <text x="515" y="596" font-family="'DM Sans', sans-serif" font-size="11" fill="#F7F6F3" fill-opacity="0.4" letter-spacing="0.7">START FREE TODAY</text>

  <!-- ═══ PHONE MOCKUP ═══ -->
  <g transform="translate(900, 75) rotate(3)">
    <!-- Outer bezel -->
    <rect x="-9" y="-9" width="258" height="498" rx="45" fill="#0F2018" fill-opacity="0.6" stroke="white" stroke-opacity="0.06"/>
    <!-- Phone body -->
    <rect width="240" height="480" rx="36" fill="#1C3D2E" stroke="white" stroke-opacity="0.1"/>
    <!-- Inner highlight -->
    <rect x="0.5" y="0.5" width="239" height="1" rx="0" fill="white" fill-opacity="0.08"/>

    <!-- Header -->
    <text x="18" y="40" font-family="'Lora', serif" font-size="11" font-weight="600" fill="#F7F6F3" fill-opacity="0.5" letter-spacing="0.9">WATCHES</text>

    <!-- Card 1: Nike -->
    <rect x="14" y="52" width="212" height="52" rx="14" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.08"/>
    <text x="28" y="83" font-size="20">👟</text>
    <text x="56" y="73" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#F7F6F3">Nike Dunk Low Panda</text>
    <text x="56" y="88" font-family="'DM Sans', sans-serif" font-size="9.5" fill="#F7F6F3" fill-opacity="0.5">Alert below $90</text>
    <rect x="172" y="64" width="44" height="20" rx="10" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-opacity="0.3"/>
    <text x="180" y="78" font-family="'DM Sans', sans-serif" font-size="9" font-weight="700" fill="#F59E0B">↓ $89</text>

    <!-- Card 2: Flight -->
    <rect x="14" y="112" width="212" height="52" rx="14" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.08"/>
    <text x="28" y="143" font-size="20">✈️</text>
    <text x="56" y="133" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#F7F6F3">NYC → LAX</text>
    <text x="56" y="148" font-family="'DM Sans', sans-serif" font-size="9.5" fill="#F7F6F3" fill-opacity="0.5">Any price change</text>
    <rect x="155" y="124" width="62" height="20" rx="10" fill="#6EE7B7" fill-opacity="0.1" stroke="#6EE7B7" stroke-opacity="0.2"/>
    <text x="163" y="138" font-family="'DM Sans', sans-serif" font-size="9" font-weight="700" fill="#6EE7B7">Watching</text>

    <!-- Card 3: Carbone -->
    <rect x="14" y="172" width="212" height="52" rx="14" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.08"/>
    <text x="28" y="203" font-size="20">🍽</text>
    <text x="56" y="193" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#F7F6F3">Carbone NY · 2 guests</text>
    <text x="56" y="208" font-family="'DM Sans', sans-serif" font-size="9.5" fill="#F7F6F3" fill-opacity="0.5">Fri or Sat night</text>
    <rect x="168" y="184" width="48" height="20" rx="10" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.22"/>
    <text x="178" y="198" font-family="'DM Sans', sans-serif" font-size="9" font-weight="700" fill="#34d399">Open!</text>

    <!-- Notification bar -->
    <rect x="14" y="238" width="212" height="46" rx="14" fill="url(#notifgr)" stroke="#6EE7B7" stroke-opacity="0.2"/>
    <circle cx="28" cy="261" r="3.5" fill="#6EE7B7"/>
    <text x="40" y="256" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600" fill="#6EE7B7">Price dropped!</text>
    <text x="40" y="270" font-family="'DM Sans', sans-serif" font-size="10" fill="#F7F6F3" fill-opacity="0.75">Nike Dunks now $89 at Nike.com</text>

    <!-- Savings card -->
    <rect x="14" y="296" width="212" height="68" rx="14" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.07"/>
    <text x="26" y="316" font-family="'DM Sans', sans-serif" font-size="8.5" font-weight="600" fill="#6EE7B7" fill-opacity="0.5" letter-spacing="1">TOTAL SAVED</text>
    <text x="26" y="346" font-family="'Lora', serif" font-size="22" font-weight="700" fill="#6EE7B7">$247</text>
    <text x="26" y="360" font-family="'DM Sans', sans-serif" font-size="9" fill="#F7F6F3" fill-opacity="0.35">Across 12 deals</text>
  </g>

  <!-- ═══ BRAND MARK (bottom right) ═══ -->
  <g transform="translate(1098, 586)">
    <g transform="translate(0, 0) scale(0.027)">
      <rect width="1024" height="1024" rx="224" fill="url(#logobg)"/>
      <g transform="translate(0,42)">
        <path d="M512 210C512 210 640 258 680 310C720 362 720 430 720 490C720 590 660 670 512 730C364 670 304 590 304 490C304 430 304 362 344 310C384 258 512 210Z" fill="url(#logoshield)" opacity="0.18"/>
      </g>
      <path d="M448 488Q445 536 425 579Q405 622 367 649Q329 676 270 676Q208 676 175 641Q142 606 142 559Q142 517 166 488Q190 460 228 438Q267 417 310 397Q348 380 386 360Q424 341 455 316Q486 291 504 256Q523 222 523 174Q523 119 495 76Q468 33 416 8Q364 -16 289 -16Q244 -16 196 -3Q148 10 111 35L116 -8H64L58 205H97Q102 117 158 71Q214 26 293 26Q332 26 365 40Q398 55 417 83Q437 111 437 151Q437 196 413 226Q389 256 351 278Q313 300 270 320Q232 337 195 356Q158 375 127 399Q97 424 78 458Q60 492 60 540Q60 566 69 596Q78 626 100 653Q123 681 162 698Q202 716 263 716Q301 716 348 705Q396 695 437 665L433 708H484V488Z" transform="translate(388.55,660.22) scale(0.4235,-0.4235)" fill="url(#logos)"/>
      <g transform="translate(607,355)">
        <circle cx="0" cy="0" r="22" fill="#6EE7B7" fill-opacity="0.15"/>
        <path d="M0 -14 L3.5 -3.5 L14 0 L3.5 3.5 L0 14 L-3.5 3.5 L-14 0 L-3.5 -3.5 Z" fill="url(#logostar)"/>
      </g>
    </g>
    <text x="36" y="20" font-family="'Lora', serif" font-size="18" font-weight="700" fill="#F7F6F3" letter-spacing="-0.2">Steward</text>
  </g>

  </g><!-- end clip -->

  <!-- Rounded border -->
  <rect width="1200" height="630" rx="20" fill="none" stroke="white" stroke-opacity="0.07"/>
</svg>
