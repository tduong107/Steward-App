<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#1C3D2E"/>
  <rect width="1024" height="1024" rx="224" fill="url(#bgGradient)"/>

  <!-- Texture rings -->
  <circle cx="512" cy="512" r="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="512" cy="512" r="360" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Shield (+42 centres it around the S) -->
  <g transform="translate(0,42)">
    <path d="M512 210 C512 210 640 258 680 310 C720 362 720 430 720 490
             C720 590 660 670 512 730 C364 670 304 590 304 490
             C304 430 304 362 344 310 C384 258 512 210 512 210Z"
      fill="url(#shieldGradient)" opacity="0.15"/>
    <path d="M512 228 C512 228 632 272 670 320 C708 368 708 432 708 488
             C708 582 652 658 512 714 C372 658 316 582 316 488
             C316 432 316 368 354 320 C392 272 512 228 512 228Z"
      fill="none" stroke="rgba(110,231,183,0.2)" stroke-width="1.5"/>
    <path d="M512 252 C512 252 616 290 650 332 C684 374 684 430 684 482
             C684 566 634 634 512 686 C390 634 340 566 340 482
             C340 430 340 374 374 332 C408 290 512 252 512 252Z"
      fill="none" stroke="rgba(110,231,183,0.08)" stroke-width="1"/>
  </g>

  <!-- S glow layer -->
  <path d="M448 488Q445 536 425.0 579.0Q405 622 367.0 649.0Q329 676 270 676Q208 676 175.0 641.0Q142 606 142 559Q142 517 166.0 488.5Q190 460 228.5 438.5Q267 417 310 397Q348 380 386.0 360.5Q424 341 455.0 316.0Q486 291 504.5 256.5Q523 222 523 174Q523 119 495.5 76.0Q468 33 416.0 8.5Q364 -16 289 -16Q244 -16 196.0 -3.0Q148 10 111 35L116 -8H64L58 205H97Q102 117 158.0 71.5Q214 26 293 26Q332 26 365.0 40.5Q398 55 417.5 83.0Q437 111 437 151Q437 196 413.0 226.0Q389 256 351.0 278.0Q313 300 270 320Q232 337 195.0 356.0Q158 375 127.5 399.5Q97 424 78.5 458.0Q60 492 60 540Q60 566 69.0 596.0Q78 626 100.5 653.5Q123 681 162.5 698.5Q202 716 263 716Q301 716 348.5 705.5Q396 695 437 665L433 708H484V488Z"
    transform="translate(388.55,660.22) scale(0.42350,-0.42350)"
    fill="white" opacity="0.13" filter="url(#sBlur)"/>

  <!-- S letterform — baked Lora serif path, visual centre at (512,512) -->
  <path d="M448 488Q445 536 425.0 579.0Q405 622 367.0 649.0Q329 676 270 676Q208 676 175.0 641.0Q142 606 142 559Q142 517 166.0 488.5Q190 460 228.5 438.5Q267 417 310 397Q348 380 386.0 360.5Q424 341 455.0 316.0Q486 291 504.5 256.5Q523 222 523 174Q523 119 495.5 76.0Q468 33 416.0 8.5Q364 -16 289 -16Q244 -16 196.0 -3.0Q148 10 111 35L116 -8H64L58 205H97Q102 117 158.0 71.5Q214 26 293 26Q332 26 365.0 40.5Q398 55 417.5 83.0Q437 111 437 151Q437 196 413.0 226.0Q389 256 351.0 278.0Q313 300 270 320Q232 337 195.0 356.0Q158 375 127.5 399.5Q97 424 78.5 458.0Q60 492 60 540Q60 566 69.0 596.0Q78 626 100.5 653.5Q123 681 162.5 698.5Q202 716 263 716Q301 716 348.5 705.5Q396 695 437 665L433 708H484V488Z"
    transform="translate(388.55,660.22) scale(0.42350,-0.42350)"
    fill="url(#sGradient)"/>

  <!-- Spark — 4-pointed star, top-right of S -->
  <g transform="translate(607,355)">
    <circle cx="0" cy="0" r="22" fill="rgba(110,231,183,0.15)"/>
    <path d="M0 -14 L3.5 -3.5 L14 0 L3.5 3.5 L0 14 L-3.5 3.5 L-14 0 L-3.5 -3.5 Z"
      fill="url(#sparkGradient)"/>
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.9"/>
  </g>

  <!-- Decorative rules beneath S -->
  <rect x="447" y="725" width="130" height="2.5" rx="1.25" fill="rgba(110,231,183,0.25)"/>
  <rect x="476" y="737" width="72"  height="1.5" rx="0.75" fill="rgba(110,231,183,0.12)"/>

  <defs>
    <filter id="sBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="bgGradient" x1="512" y1="0" x2="512" y2="1024"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#243D30"/>
      <stop offset="100%" stop-color="#0F2018"/>
    </linearGradient>
    <radialGradient id="shieldGradient" cx="50%" cy="35%" r="55%"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#2A5C45"/>
    </radialGradient>
    <linearGradient id="sGradient" x1="512" y1="357" x2="512" y2="667"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="50%"  stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <radialGradient id="sparkGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </radialGradient>
  </defs>
</svg>
